
# === Terminal & Rendering ===

# Advertise the modern tmux terminal type to apps inside panes
set -g default-terminal "tmux-256color"

# Enable truecolor (RGB) for both inner and outer terminals (tmux >= 3.2)
# Inner: tmux-256color (what apps inside panes see)
# Outer: xterm-256color (what iTerm2/SSH presents to tmux)
set -as terminal-features ",tmux-256color:RGB"
set -as terminal-features ",xterm-256color:RGB"

set -g history-limit 200000
set -g mouse on

set -g set-clipboard on
set -g allow-passthrough on

# Enable extended keys to pass through modifiers like Option/Alt
set -g extended-keys on
set -as terminal-features 'xterm*:extkeys'

# === Sensible Defaults ===

# Low enough for snappy Esc in vim, high enough to avoid Alt-key artifacts
set -s escape-time 10

# Keep status messages visible long enough to read
set -g display-time 4000

# Refresh status bar every 5s instead of default 15s
set -g status-interval 5

# Let terminals report focus changes (needed by vim's autoread)
set -g focus-events on

# Resize to smallest *viewer* of a window, not smallest *session*
setw -g aggressive-resize on

# Emacs keys in command prompt — sane even for vi users
set -g status-keys emacs

# === Numbering & Windows ===

# Windows and panes start at 1 (matches keyboard layout)
set -g base-index 1
setw -g pane-base-index 1

# Fill gaps when a window is closed
set -g renumber-windows on

# Mark windows that have unseen output, but don't flash a message
setw -g monitor-activity on
set -g visual-activity off

# === Key Bindings — Navigation ===

# Splits that open in the working directory
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# New window keeps working directory
bind c new-window -c "#{pane_current_path}"

# hjkl pane navigation (vi muscle memory)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# HJKL pane resizing in 5-cell steps (repeatable)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Quick config reload
bind R source-file ~/.tmux.conf \; display-message "Config reloaded"

# === Vi Copy Mode ===

setw -g mode-keys vi

# v to begin selection, y to yank (clipboard handled by OSC 52 via set-clipboard)
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel

# === Status Bar ===

set -g status-style "bg=default,fg=colour7"
set -g status-position bottom
set -g status-justify left

# Left: session name pill in teal
set -g status-left "#[fg=colour0,bg=colour2,bold] #S #[bg=default] "
set -g status-left-length 20

# Right: day and time
set -g status-right "#[fg=colour7] %a %d %b #[fg=colour4,bold]%H:%M "
set -g status-right-length 30

# Active window: bright text on purple pill (stands out)
setw -g window-status-current-format "#[fg=colour15,bg=colour4,bold] #I:#W "

# Inactive window: dim text on dim purple pill (recedes)
setw -g window-status-format "#[fg=colour0,bg=colour8] #I:#W "

# Activity marker: yellow text, no bold
setw -g window-status-activity-style "fg=colour3,bg=default,none"

# Small gap between window tabs
setw -g window-status-separator " "

# === Pane Borders ===

set -g pane-border-style "fg=colour8"
set -g pane-active-border-style "fg=colour2,bold"
set -g pane-border-lines heavy

# Show pane number briefly on activity (Ctrl-B q already does this;
# longer display time makes it easier to pick the right pane)
set -g display-panes-time 2000
set -g display-panes-active-colour colour2
set -g display-panes-colour colour8

# === Messages & Menus ===

set -g message-style "bg=colour4,fg=colour0,bold"
set -g message-command-style "bg=colour8,fg=colour7"
set -g mode-style "bg=colour4,fg=colour0"
